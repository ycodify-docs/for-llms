document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"93baba08-746f-4908-9407-ffd47db5b08d\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9d90035c-f0b6-4b0e-9705-319a5b2e32de\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"d833a502-fe6d-4d1d-a89d-9935c58d3261\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"eab83ded-537d-440d-979b-8db900d53e2f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"2c901a7c-b678-4bcd-86b5-5ca8e0ca4993\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  @page { size: A4; margin: 0; }\n  @media print {\n    html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }\n    .yc-desk { background: #fff !important; padding: 0 !important; display: block !important; min-height: 0 !important; }\n    .yc-sheet { width: auto !important; margin: 0 !important; box-shadow: none !important; border-radius: 0 !important; }\n    h1, h2, h3, h4 { break-after: avoid; }\n    tr, table, img, svg { break-inside: avoid; }\n    p, li { orphans: 3; widows: 3; }\n    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"yc-desk\" style=\"min-height:100vh; background:#ece8dd; padding:48px 24px; box-sizing:border-box; display:flex; justify-content:center;\">\n  <div class=\"yc-sheet\" data-screen-label=\"Document\" style=\"width:210mm; max-width:100%; background:#fff; box-shadow:0 2px 14px rgba(20,20,19,0.12); border-radius:2px; box-sizing:border-box; padding:0.85in; font-family:'Manrope',sans-serif;\">\n\n\n  <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:#9aa39d; padding-bottom:8px; margin-bottom:26px; border-bottom:1px solid #e7ece8;\">\n    <span style=\"display:inline-flex; align-items:center; gap:7px;\"><span style=\"width:14px; height:14px; border-radius:4px; background:#00d676; display:inline-block;\"><\u002Fspan> Ycodify · Shell Universal<\u002Fspan>\n    <span>Guia de identidade e governança visual<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ========================= CAPA / ABERTURA ========================= -->\n  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#8a948d; display:flex; align-items:center; gap:9px; margin-bottom:18px;\">\n    <span style=\"width:26px; height:2px; background:#00d676; display:inline-block;\"><\u002Fspan> Fundamentos de construção\n  <\u002Fdiv>\n\n  <h1 style=\"font-family:'Manrope',sans-serif; font-size:34px; font-weight:800; letter-spacing:-0.025em; line-height:1.1; color:#111a15; margin:0 0 16px;\">Princípios de design da<br>Shell Universal<\u002Fh1>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:15.5px; line-height:1.65; color:#4a544d; max-width:60ch; margin:0 0 14px;\">Este documento define os <strong>valores, princípios e estruturas<\u002Fstrong> que orientam a construção da casca de aplicação da Ycodify — a moldura única que hospeda qualquer produto, para qualquer organização (tenant), preservando uma só identidade visual.<\u002Fp>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:15.5px; line-height:1.65; color:#4a544d; max-width:60ch; margin:0 0 30px;\">Ele é a <strong>fonte da verdade<\u002Fstrong>. À medida que a aplicação evolui — novos módulos, novas telas, novos tenants — as decisões aqui registradas devem ser respeitadas para manter uniformidade e coerência. Divergências são permitidas apenas quando promovidas a nova regra neste guia.<\u002Fp>\n\n  <div style=\"height:1px; background:#e7ece8; margin:0 0 30px;\"><\u002Fdiv>\n\n  <!-- ========================= 1. FILOSOFIA ========================= -->\n  <h2 style=\"font-family:'Manrope',sans-serif; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#00a85c; margin:0 0 4px;\">01 — Filosofia<\u002Fh2>\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 14px;\">A casca se molda ao tenant, não o contrário<\u002Fh3>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:14.5px; line-height:1.65; color:#4a544d; max-width:62ch; margin:0 0 14px;\">A Shell é uma estrutura estável e reconhecível dentro da qual o conteúdo varia. O usuário entra uma vez e navega entre organizações, projetos e módulos sem reaprender a interface. A identidade da Ycodify permanece constante; o que muda é o <em>dado<\u002Fem>, o <em>papel<\u002Fem> do usuário e, no limite, a <em>cor de marca<\u002Fem> do tenant.<\u002Fp>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:14.5px; line-height:1.65; color:#4a544d; max-width:62ch; margin:0 0 22px;\">Toda decisão de design responde a uma pergunta: <strong>isso ajuda a casca a acomodar o desconhecido sem perder a própria identidade?<\u002Fstrong><\u002Fp>\n\n  <!-- ========================= 2. VALORES ========================= -->\n  <h2 style=\"font-family:'Manrope',sans-serif; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#00a85c; margin:0 0 4px;\">02 — Valores<\u002Fh2>\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 18px;\">Cinco compromissos inegociáveis<\u002Fh3>\n\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:0 0 26px;\">\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#00a85c; letter-spacing:.1em; margin-bottom:7px;\">V1<\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:15px; font-weight:800; color:#111a15; margin-bottom:5px;\">Familiaridade acima de novidade<\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.55; color:#5a645d; margin:0;\">Um padrão previsível vale mais que um efeito inédito. Reuso de componente antes de invenção.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#00a85c; letter-spacing:.1em; margin-bottom:7px;\">V2<\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:15px; font-weight:800; color:#111a15; margin-bottom:5px;\">Clareza acima de densidade<\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.55; color:#5a645d; margin:0;\">Ar, hierarquia e cantos macios. Nunca encher a tela porque há espaço — cada elemento deve justificar sua presença.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#00a85c; letter-spacing:.1em; margin-bottom:7px;\">V3<\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:15px; font-weight:800; color:#111a15; margin-bottom:5px;\">Contexto sempre visível<\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.55; color:#5a645d; margin:0;\">O usuário nunca se pergunta em qual organização, papel ou tela está. A barra superior responde antes da dúvida.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#00a85c; letter-spacing:.1em; margin-bottom:7px;\">V4<\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:15px; font-weight:800; color:#111a15; margin-bottom:5px;\">Um token, um sistema<\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.55; color:#5a645d; margin:0;\">Nenhuma cor, espaçamento ou raio literal no código de tela. Tudo deriva dos tokens semânticos — a única via de mudança.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid; grid-column:span 2;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#00a85c; letter-spacing:.1em; margin-bottom:7px;\">V5<\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:15px; font-weight:800; color:#111a15; margin-bottom:5px;\">Todo estado é projetado<\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.55; color:#5a645d; margin:0;\">Pronto, vazio, carregando e erro não são acidentes — são quatro telas desenhadas com o mesmo cuidado. Uma feature só está pronta quando os quatro existem.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ========================= 3. IDENTIDADE VISUAL ========================= -->\n  <h2 style=\"font-family:'Manrope',sans-serif; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#00a85c; margin:0 0 4px;\">03 — Identidade visual<\u002Fh2>\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 16px;\">Marca e cor<\u002Fh3>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:14.5px; line-height:1.65; color:#4a544d; max-width:62ch; margin:0 0 16px;\">O verde Ycodify é o único primitivo de marca. Todos os tons de acento derivam dele. O tenant pode sobrescrever <code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; background:#f0f3f1; padding:1px 5px; border-radius:5px;\">--yc-brand<\u002Fcode> em runtime e a casca inteira recolore — sem recompilar, sem quebrar contraste.<\u002Fp>\n\n  <div style=\"display:flex; gap:10px; margin:0 0 8px; break-inside:avoid;\">\n    <div style=\"flex:1;\">\n      <div style=\"height:56px; border-radius:12px; background:#00d676; border:1px solid #e7ece8;\"><\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5a645d; margin-top:6px;\">--yc-brand<br><span style=\"color:#9aa39d;\">#00d676<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;\">\n      <div style=\"height:56px; border-radius:12px; background:#07935a; border:1px solid #e7ece8;\"><\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5a645d; margin-top:6px;\">--accent-ink<br><span style=\"color:#9aa39d;\">#07935a<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;\">\n      <div style=\"height:56px; border-radius:12px; background:#dcf7e9; border:1px solid #e7ece8;\"><\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5a645d; margin-top:6px;\">--accent-weak<br><span style=\"color:#9aa39d;\">#dcf7e9<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;\">\n      <div style=\"height:56px; border-radius:12px; background:#043019; border:1px solid #e7ece8;\"><\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5a645d; margin-top:6px;\">--accent-fg<br><span style=\"color:#9aa39d;\">#043019<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.6; color:#7a847d; max-width:62ch; margin:8px 0 22px; font-style:italic;\">Regra: o verde cheio nunca recebe texto que não seja <code style=\"font-family:'IBM Plex Mono',monospace; font-style:normal; font-size:11.5px; background:#f0f3f1; padding:1px 5px; border-radius:5px;\">--accent-fg<\u002Fcode>. Para texto de acento sobre fundo claro, use sempre <code style=\"font-family:'IBM Plex Mono',monospace; font-style:normal; font-size:11.5px; background:#f0f3f1; padding:1px 5px; border-radius:5px;\">--accent-ink<\u002Fcode>, nunca o verde puro (contraste insuficiente).<\u002Fp>\n\n  <h4 style=\"font-family:'Manrope',sans-serif; font-size:15px; font-weight:800; color:#111a15; margin:0 0 12px;\">Cores de estado (semânticas, não decorativas)<\u002Fh4>\n  <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin:0 0 26px; break-inside:avoid;\">\n    <div style=\"border-radius:10px; padding:12px; background:#e4f3ea;\">\n      <div style=\"width:14px; height:14px; border-radius:5px; background:#1f7a4d; margin-bottom:8px;\"><\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:700; color:#111a15;\">Sucesso<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:#7a847d;\">--ok<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:10px; padding:12px; background:#f6efdd;\">\n      <div style=\"width:14px; height:14px; border-radius:5px; background:#9a6412; margin-bottom:8px;\"><\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:700; color:#111a15;\">Atenção<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:#7a847d;\">--warn<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:10px; padding:12px; background:#e4f1f6;\">\n      <div style=\"width:14px; height:14px; border-radius:5px; background:#1f6f9a; margin-bottom:8px;\"><\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:700; color:#111a15;\">Informação<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:#7a847d;\">--info<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:10px; padding:12px; background:#f8eae8;\">\n      <div style=\"width:14px; height:14px; border-radius:5px; background:#b23b34; margin-bottom:8px;\"><\u002Fdiv>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:700; color:#111a15;\">Erro<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:#7a847d;\">--danger<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ========================= TIPOGRAFIA ========================= -->\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 16px;\">Tipografia<\u002Fh3>\n\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:0 0 16px; break-inside:avoid;\">\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:18px 20px;\">\n      <div style=\"font-family:'Manrope',sans-serif; font-size:34px; font-weight:800; letter-spacing:-0.02em; color:#111a15; line-height:1;\">Manrope<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#9aa39d; margin:8px 0 12px;\">400 · 500 · 600 · 700 · 800<\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.55; color:#5a645d; margin:0;\">Interface inteira: títulos, corpo, rótulos, botões. Peso 800 para títulos, 700 para ênfase, 500–600 para corpo e controles.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:18px 20px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:30px; font-weight:600; color:#111a15; line-height:1;\">IBM Plex Mono<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#9aa39d; margin:8px 0 12px;\">400 · 500 · 600<\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.55; color:#5a645d; margin:0;\">Metadados técnicos: identificadores, códigos de org, atalhos, timestamps, rótulos em caixa-alta. Nunca para corpo de leitura.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.6; color:#7a847d; max-width:62ch; margin:0 0 26px; font-style:italic;\">Duas famílias, sem exceção. Uma terceira fonte só entra por decisão registrada neste guia. Corpo mínimo de interface: 13px; texto de leitura longa: 14–15px com entrelinha 1.6.<\u002Fp>\n\n  <!-- ========================= ESCALA / RAIO / ELEVAÇÃO ========================= -->\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 16px;\">Espaço, raio e elevação<\u002Fh3>\n\n  <table style=\"width:100%; border-collapse:collapse; font-family:'Manrope',sans-serif; font-size:13px; margin:0 0 12px;\">\n    <thead>\n      <tr style=\"border-bottom:2px solid #e7ece8;\">\n        <th style=\"text-align:left; padding:8px 10px; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:#9aa39d; font-weight:700;\">Dimensão<\u002Fth>\n        <th style=\"text-align:left; padding:8px 10px; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:#9aa39d; font-weight:700;\">Regra<\u002Fth>\n        <th style=\"text-align:left; padding:8px 10px; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:#9aa39d; font-weight:700;\">Valores<\u002Fth>\n      <\u002Ftr>\n    <\u002Fthead>\n    <tbody style=\"color:#4a544d;\">\n      <tr style=\"border-bottom:1px solid #eef2ef;\">\n        <td style=\"padding:9px 10px; font-weight:700; color:#111a15;\">Espaçamento<\u002Ftd>\n        <td style=\"padding:9px 10px;\">Grade de 4px; sempre múltiplos<\u002Ftd>\n        <td style=\"padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">6 · 10 · 12 · 18 · 24<\u002Ftd>\n      <\u002Ftr>\n      <tr style=\"border-bottom:1px solid #eef2ef;\">\n        <td style=\"padding:9px 10px; font-weight:700; color:#111a15;\">Raio<\u002Ftd>\n        <td style=\"padding:9px 10px;\">Macio por padrão; pílula p/ ações e chips<\u002Ftd>\n        <td style=\"padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">10 · 14 controles · 999 pílula<\u002Ftd>\n      <\u002Ftr>\n      <tr style=\"border-bottom:1px solid #eef2ef;\">\n        <td style=\"padding:9px 10px; font-weight:700; color:#111a15;\">Altura de controle<\u002Ftd>\n        <td style=\"padding:9px 10px;\">Toque confortável; alvo mín. 38px<\u002Ftd>\n        <td style=\"padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">38 · 42 (perfil)<\u002Ftd>\n      <\u002Ftr>\n      <tr style=\"border-bottom:1px solid #eef2ef;\">\n        <td style=\"padding:9px 10px; font-weight:700; color:#111a15;\">Bordas<\u002Ftd>\n        <td style=\"padding:9px 10px;\">1px, tom de borda semântico<\u002Ftd>\n        <td style=\"padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">--border · --border-2<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td style=\"padding:9px 10px; font-weight:700; color:#111a15;\">Elevação<\u002Ftd>\n        <td style=\"padding:9px 10px;\">Uma sombra só (popovers/menus); nunca empilhar<\u002Ftd>\n        <td style=\"padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">--shadow<\u002Ftd>\n      <\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.6; color:#7a847d; max-width:62ch; margin:0 0 30px; font-style:italic;\">Sombra é sinal de camada flutuante, não de decoração. Superfícies base (cards, painéis) usam borda, não sombra.<\u002Fp>\n\n  <!-- ========================= 4. ESTRUTURA ========================= -->\n  <h2 style=\"font-family:'Manrope',sans-serif; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#00a85c; margin:0 0 4px;\">04 — Estrutura<\u002Fh2>\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 16px;\">Anatomia da casca<\u002Fh3>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:14.5px; line-height:1.65; color:#4a544d; max-width:62ch; margin:0 0 16px;\">A moldura é fixa. O conteúdo é o que respira dentro dela.<\u002Fp>\n\n  <div style=\"border:1px solid #e7ece8; border-radius:16px; overflow:hidden; margin:0 0 16px; break-inside:avoid;\">\n    <div style=\"background:#f3f8f5; border-bottom:1px solid #e7ece8; padding:12px 16px; display:flex; align-items:center; gap:10px;\">\n      <span style=\"width:22px; height:22px; border-radius:7px; background:#00d676; display:grid; place-items:center; flex-shrink:0;\"><\u002Fspan>\n      <div>\n        <div style=\"font-family:'Manrope',sans-serif; font-size:13px; font-weight:800; color:#111a15;\">Barra superior — sempre presente<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif; font-size:11.5px; color:#7a847d;\">Marca · seletor de organização · busca/comando (⌘K) · tema · notificações · perfil<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:16px; display:grid; grid-template-columns:auto 1fr; gap:0;\">\n      <div style=\"border-right:1px solid #eef2ef; padding-right:16px; margin-right:16px;\">\n        <div style=\"font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:800; color:#111a15; margin-bottom:4px;\">Navegação lateral<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif; font-size:11.5px; line-height:1.5; color:#7a847d; max-width:20ch;\">Reconstruída a partir dos papéis org-scoped do token. O menu é do usuário, não fixo.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:800; color:#111a15; margin-bottom:4px;\">Área de conteúdo<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif; font-size:11.5px; line-height:1.5; color:#7a847d; max-width:34ch;\">O único espaço que varia por módulo. Herda todos os tokens; nunca introduz cor ou fonte própria.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.6; color:#7a847d; max-width:62ch; margin:0 0 30px; font-style:italic;\">O menu não é uma constante desenhada: é derivado dos papéis que o token do usuário carrega naquela organização. Ao trocar de org, a navegação se reconstrói.<\u002Fp>\n\n  <!-- ========================= OS QUATRO ESTADOS ========================= -->\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 16px;\">Os quatro estados de toda tela<\u002Fh3>\n\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:0 0 30px;\">\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:8px;\"><span style=\"width:9px; height:9px; border-radius:999px; background:#1f7a4d;\"><\u002Fspan><span style=\"font-family:'Manrope',sans-serif; font-size:14px; font-weight:800; color:#111a15;\">Pronto<\u002Fspan><\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:12.5px; line-height:1.55; color:#5a645d; margin:0;\">O caso feliz. Dados carregados, ações disponíveis. Densidade equilibrada, sem sobrecarga.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:8px;\"><span style=\"width:9px; height:9px; border-radius:999px; background:#899a8f;\"><\u002Fspan><span style=\"font-family:'Manrope',sans-serif; font-size:14px; font-weight:800; color:#111a15;\">Vazio<\u002Fspan><\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:12.5px; line-height:1.55; color:#5a645d; margin:0;\">Nunca uma tela em branco. Explica o que aparecerá ali e oferece a primeira ação.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:8px;\"><span style=\"width:9px; height:9px; border-radius:999px; background:#1f6f9a;\"><\u002Fspan><span style=\"font-family:'Manrope',sans-serif; font-size:14px; font-weight:800; color:#111a15;\">Carregando<\u002Fspan><\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:12.5px; line-height:1.55; color:#5a645d; margin:0;\">Esqueleto com a forma do conteúdo real (shimmer), não um spinner solto. Preserva o layout.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e7ece8; border-radius:14px; padding:16px 18px; break-inside:avoid;\">\n      <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:8px;\"><span style=\"width:9px; height:9px; border-radius:999px; background:#b23b34;\"><\u002Fspan><span style=\"font-family:'Manrope',sans-serif; font-size:14px; font-weight:800; color:#111a15;\">Erro<\u002Fspan><\u002Fdiv>\n      <p style=\"font-family:'Manrope',sans-serif; font-size:12.5px; line-height:1.55; color:#5a645d; margin:0;\">Diz o que falhou em linguagem humana e oferece um caminho de recuperação. Nunca um código cru.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ========================= 5. GOVERNANÇA ========================= -->\n  <h2 style=\"font-family:'Manrope',sans-serif; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#00a85c; margin:0 0 4px;\">05 — Governança<\u002Fh2>\n  <h3 style=\"font-family:'Manrope',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#111a15; margin:0 0 16px;\">Regras para evoluir sem perder identidade<\u002Fh3>\n\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:0 26px; margin:0 0 22px; break-inside:avoid;\">\n    <div>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#1f7a4d; margin-bottom:12px; display:flex; align-items:center; gap:7px;\"><span style=\"width:16px; height:16px; border-radius:5px; background:#e4f3ea; display:grid; place-items:center; color:#1f7a4d; font-size:11px;\">✓<\u002Fspan> Faça<\u002Fdiv>\n      <ul style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.6; color:#4a544d; margin:0; padding-left:18px;\">\n        <li style=\"margin-bottom:8px;\">Derive toda cor, espaço e raio dos tokens semânticos.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Projete os quatro estados antes de considerar a feature pronta.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Reuse um componente existente antes de criar um novo.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Teste claro e escuro em toda tela nova.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Promova qualquer padrão novo a regra neste guia.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Manrope',sans-serif; font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#b23b34; margin-bottom:12px; display:flex; align-items:center; gap:7px;\"><span style=\"width:16px; height:16px; border-radius:5px; background:#f8eae8; display:grid; place-items:center; color:#b23b34; font-size:11px;\">✕<\u002Fspan> Não faça<\u002Fdiv>\n      <ul style=\"font-family:'Manrope',sans-serif; font-size:13px; line-height:1.6; color:#4a544d; margin:0; padding-left:18px;\">\n        <li style=\"margin-bottom:8px;\">Escrever cor/medida literal (hex, px de cor) na tela.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Introduzir uma terceira fonte ou nova família de cor.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Empilhar sombras ou usar sombra como decoração.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Entregar uma tela em branco como estado vazio.<\u002Fli>\n        <li style=\"margin-bottom:8px;\">Alterar a moldura (barra, navegação) por módulo.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#f3f8f5; border:1px solid #dcf7e9; border-radius:14px; padding:18px 20px; margin:0 0 12px; break-inside:avoid;\">\n    <div style=\"font-family:'Manrope',sans-serif; font-size:13px; font-weight:800; color:#07935a; margin-bottom:6px;\">O teste de identidade<\u002Fdiv>\n    <p style=\"font-family:'Manrope',sans-serif; font-size:14px; line-height:1.6; color:#3c463f; margin:0;\">Coloque a tela nova ao lado de qualquer tela existente. Se um usuário não conseguir dizer que pertencem ao mesmo produto — sem olhar o logo — a tela nova ainda não está pronta. <strong>Uniformidade é o recurso, não o acabamento.<\u002Fstrong><\u002Fp>\n  <\u002Fdiv>\n\n  <p style=\"font-family:'Manrope',sans-serif; font-size:12px; line-height:1.6; color:#9aa39d; margin:18px 0 0;\">Este é um documento vivo. Toda decisão que amplia ou altera o sistema deve ser refletida aqui na mesma entrega — o guia e o produto nunca divergem. Referência técnica de tokens: <code style=\"font-family:'IBM Plex Mono',monospace; font-size:11px;\">react-reference/theme.css<\u002Fcode>.<\u002Fp>\n\n  <div style=\"display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.1em; color:#b3bcb6; padding-top:8px; margin-top:34px; border-top:1px solid #e7ece8;\">\n    <span>Direção Atlas · v1.0 · jul/2026<\u002Fspan>\n    <span>Documento vivo — revisar a cada release maior<\u002Fspan>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
